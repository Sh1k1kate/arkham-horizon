    <style>
        /* ========== ДОПОЛНИТЕЛЬНЫЕ СТИЛИ ТОЛЬКО ДЛЯ СПРАВОЧНИКА ========== */
        .help-page {
            padding-top: 20px;
        }
        
        /* Верхняя панель навигации (как на главной) */
        .top-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 25px;
            padding: 10px 20px;
            background: rgba(26, 26, 46, 0.5);
            border-radius: var(--border-radius);
            border: 1px solid rgba(218, 165, 32, 0.3);
            backdrop-filter: blur(5px);
        }
        
        .top-action-btn {
            background: linear-gradient(135deg, var(--secondary-light), var(--secondary));
            color: var(--text-light);
            padding: 10px 20px;
            border: 1px solid var(--accent);
            border-radius: var(--border-radius);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .top-action-btn:hover {
            background: var(--accent);
            color: var(--secondary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        
        /* Блок поиска и фильтров */
        .help-controls {
            background: rgba(26, 26, 46, 0.7);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(218, 165, 32, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .help-search {
            margin-bottom: 20px;
        }
        
        .help-search-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            border: 2px solid rgba(218, 165, 32, 0.3);
            background: var(--secondary-dark);
            color: var(--text-light);
            font-size: 1.1rem;
            font-family: 'Cinzel', serif;
        }
        
        .help-search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(218, 165, 32, 0.3);
        }
        
        .help-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .help-filter-btn {
            background: var(--secondary-light);
            color: var(--text-light);
            border: 1px solid rgba(218, 165, 32, 0.3);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            transition: all 0.3s ease;
        }
        
        .help-filter-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }
        
        .help-filter-btn.active {
            background: var(--accent);
            color: var(--secondary-dark);
            border-color: var(--accent-dark);
        }
        
        .cards-count {
            text-align: center;
            color: var(--text-dark);
            margin: 20px 0;
            font-size: 1.1rem;
        }
        
        .cards-count span {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.3rem;
        }
        
        /* Сетка карточек */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        
        /* Карточка */
        .catalog-card {
            background: linear-gradient(135deg, var(--secondary-light), var(--secondary));
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(218, 165, 32, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .catalog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(218, 165, 32, 0.3);
            border-color: var(--accent);
        }
        
        .catalog-card-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-bottom: 2px solid var(--accent);
            transition: transform 0.5s ease;
        }
        
        .catalog-card:hover .catalog-card-image {
            transform: scale(1.05);
        }
        
        /* Блок с текстом + фон-рубашка */
        .catalog-card-content {
            position: relative;
            padding: 12px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: var(--secondary-dark); /* запасной фон, если картинка не загрузится */
            border-top: 2px solid var(--accent);
            z-index: 1;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        
        /* Затемняющая подложка для читаемости текста */
        .catalog-card-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
            pointer-events: none;
        }
        
        /* Текст поверх затемнения */
        .catalog-card-title,
        .catalog-card-description,
        .catalog-card-type {
            position: relative;
            z-index: 2;
        }
        
        .catalog-card-title {
            color: var(--accent);
            font-size: 1rem;
            font-family: 'MedievalSharp', cursive;
            margin: 0 0 4px 0;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.6rem;
        }
        
        .catalog-card-description {
            color: var(--text-light);
            font-size: 0.8rem;
            line-height: 1.4;
            margin: 0 0 6px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.2rem;
        }
        
        .catalog-card-type {
            display: inline-block;
            padding: 4px 8px;
            background: var(--secondary-dark);
            border-radius: 12px;
            font-size: 0.7rem;
            color: var(--accent);
            border: 1px solid var(--accent);
            align-self: flex-start;
            margin-top: auto;
        }
        
        /* Сообщение об отсутствии результатов */
        .no-results-message {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-dark);
            font-style: italic;
            padding: 60px 20px;
            font-size: 1.2rem;
            background: rgba(15, 15, 26, 0.5);
            border-radius: var(--border-radius);
            border: 1px solid rgba(218, 165, 32, 0.2);
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }
            
            .catalog-card-image {
                height: 130px;
            }
            
            .catalog-card-title {
                font-size: 0.9rem;
                min-height: 2.4rem;
            }
            
            .catalog-card-description {
                font-size: 0.75rem;
                min-height: 2rem;
            }
            
            .catalog-card-content {
                min-height: 100px;
                padding: 8px;
            }
        }
        
        @media (max-width: 480px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .catalog-card-image {
                height: 110px;
            }
        }
    </style>
</head>

    <script>
        // ================== ПОЛНОСТЬЮ САМОДОСТАТОЧНЫЙ СКРИПТ ==================

        class CardReference {
            constructor() {
                this.cards = {
                    investigators: [],
                    scenarios: [],
                    ancient: [],
                    items: [],
                    spells: [],
                    allies: [],
                    conditions: []
                };
            }

            async loadCardData() {
                try {
                     const response = await fetch('data/cards.json?t=' + Date.now());
                    if (response.ok) {
                        const data = await response.json();
                        // Преобразуем в единый формат с type
                        for (let key in data) {
                            if (this.cards.hasOwnProperty(key)) {
                                this.cards[key] = data[key].map(card => ({
                                    ...card,
                                    type: key === 'investigators' ? 'investigator' :
                                          key === 'scenarios' ? 'scenario' :
                                          key === 'ancient' ? 'ancient' :
                                          key === 'items' ? 'item' :
                                          key === 'spells' ? 'spell' :
                                          key === 'allies' ? 'ally' : 'condition'
                                }));
                            }
                        }
                    } else {
                        console.warn('Файл data/cards.json не найден. Создайте его или добавьте карты через админку.');
                        // Оставляем пустые массивы
                    }
                } catch (error) {
                    console.error('Ошибка загрузки данных:', error);
                }
            }

            getTotalCards() {
                return Object.values(this.cards).reduce((sum, arr) => sum + arr.length, 0);
            }

            renderCards() {
                const container = document.getElementById('cards-container');
                const countEl = document.getElementById('cards-count');
                if (!container) return;

                let html = '';
                for (let category in this.cards) {
                    html += this.cards[category].map(card => this.renderCard(card)).join('');
                }

                container.innerHTML = html || '<div class="no-results-message">В картотеке пока нет карт</div>';

                if (countEl) {
                    countEl.innerHTML = `Всего карт: <span>${this.getTotalCards()}</span>`;
                }

                this.initSearchAndFilters();
            }

            renderCard(card) {
                const defaultImage = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjE1MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMzMzIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPtCd0LXRgiDQuNC30L7QsdGA0LDQttC10L3QuNGPPC90ZXh0Pjwvc3ZnPg==';
                
                // Определяем путь к рубашке для блока с текстом в зависимости от типа карты
                let backImagePath = '';
                switch (card.type) {
                    case 'investigator':
                        backImagePath = './images/investigators/investigator.jpg';
                        break;
                    case 'scenario':
                        backImagePath = './images/scenarios/scenario.jpg';
                        break;
                    case 'ancient':
                        backImagePath = './images/ancient/ancient.jpg';
                        break;
                    case 'item':
                        backImagePath = './images/items/item.jpg';
                        break;
                    case 'spell':
                        backImagePath = './images/spells/spell.jpg';
                        break;
                    case 'ally':
                        backImagePath = './images/allies/ally.jpg';
                        break;
                    case 'condition':
                        backImagePath = './images/conditions/condition.jpg';
                        break;
                    default:
                        backImagePath = '';
                }

                const backgroundStyle = backImagePath ? `style="background-image: url('${backImagePath}');"` : '';

                return `
                <div class="catalog-card" data-category="${card.type}" data-name="${card.name.toLowerCase()}">
                    <img src="${card.image}" alt="${card.name}" class="catalog-card-image"
                         onclick="showImageModal('${card.image}', '${card.name}', '${card.type}')"
                         onerror="this.src='${defaultImage}'">
                    <div class="catalog-card-content" ${backgroundStyle}>
                        <h3 class="catalog-card-title">${card.name}</h3>
                        <p class="catalog-card-description">${card.description || ''}</p>
                        <span class="catalog-card-type">${this.getTypeLabel(card.type)}</span>
                    </div>
                </div>
                `;
            }

            getTypeLabel(type) {
                const labels = {
                    'investigator': 'Сыщик',
                    'scenario': 'Сценарий',
                    'ancient': 'Древний',
                    'item': 'Предмет',
                    'spell': 'Заклинание',
                    'ally': 'Союзник',
                    'condition': 'Состояние'
                };
                return labels[type] || type;
            }

            initSearchAndFilters() {
                const searchInput = document.getElementById('help-search');
                const filterBtns = document.querySelectorAll('.help-filter-btn');
                const cards = document.querySelectorAll('.catalog-card');
                const countEl = document.getElementById('cards-count');

                if (!searchInput || !cards.length) return;

                const updateVisibility = () => {
                    const searchTerm = searchInput.value.toLowerCase();
                    const activeFilter = document.querySelector('.help-filter-btn.active')?.dataset.category || 'all';
                    let visible = 0;

                    cards.forEach(card => {
                        const name = card.dataset.name;
                        const category = card.dataset.category;
                        const matchesSearch = name.includes(searchTerm);
                        const matchesFilter = activeFilter === 'all' || category === activeFilter;
                        card.style.display = matchesSearch && matchesFilter ? 'block' : 'none';
                        if (matchesSearch && matchesFilter) visible++;
                    });

                    // Обновляем счётчик
                    if (countEl) {
                        countEl.innerHTML = `Показано карт: <span>${visible}</span> из <span>${this.getTotalCards()}</span>`;
                    }

                    // Показываем сообщение, если ничего не найдено
                    const container = document.getElementById('cards-container');
                    let noResults = document.querySelector('.no-results-dynamic');
                    if (visible === 0) {
                        if (!noResults) {
                            noResults = document.createElement('div');
                            noResults.className = 'no-results-message no-results-dynamic';
                            container.appendChild(noResults);
                        }
                        noResults.textContent = '😔 Ничего не найдено. Попробуйте изменить запрос.';
                    } else {
                        if (noResults) noResults.remove();
                    }
                };

                searchInput.addEventListener('input', updateVisibility);
                filterBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        filterBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        updateVisibility();
                    });
                });

                updateVisibility(); // первичное обновление
            }
        }

       async function showImageModal(src, alt, type) {
    const modal = document.getElementById('image-modal');
    const modalBody = document.getElementById('image-modal-body');
    
    const basePath = src.replace(/\.[^/.]+$/, "");
    const backSideSrc = `${basePath}-1.jpg`;
    
    // Путь к типовой рубашке
    const typeBackSrc = {
        investigator: './images/investigators/investigator.jpg',
        scenario: './images/scenarios/scenario.jpg',
        ancient: './images/ancient/ancient.jpg',
        item: './images/items/item.jpg',
        spell: './images/spells/spell.jpg',
        ally: './images/allies/ally.jpg',
        condition: './images/conditions/condition.jpg'
    }[type] || null;
    
    // Проверяем существование индивидуальной оборотной стороны
    const checkBackImage = new Image();
    checkBackImage.onload = () => {
        // Есть индивидуальная оборотка
        showModalWithFlip(src, backSideSrc, alt);
    };
    
    checkBackImage.onerror = () => {
        // Нет индивидуальной – пробуем типовую
        if (typeBackSrc) {
            const checkTypeImage = new Image();
            checkTypeImage.onload = () => {
                showModalWithFlip(src, typeBackSrc, alt + ' (типовая рубашка)');
            };
            checkTypeImage.onerror = () => {
                showModalWithoutFlip(src, alt);
            };
            checkTypeImage.src = typeBackSrc;
        } else {
            showModalWithoutFlip(src, alt);
        }
    };
    
    checkBackImage.src = backSideSrc;
    
    function showModalWithFlip(frontSrc, backSrc, title) {
        modalBody.innerHTML = `
        <div class="image-modal-content">
            <div class="simple-image-container" style="position: relative; width: 100%; height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; perspective: 1000px;">
                <div id="flipper" style="position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer;">
                    <div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center;">
                        <img src="${frontSrc}" alt="${alt}" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);">
                    </div>
                    <div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center;">
                        <img src="${backSrc}" alt="${alt} (оборот)" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);">
                    </div>
                </div>
                <div style="text-align: center; margin-top: 15px; color: var(--accent);">👆 Нажмите на изображение для переворота</div>
            </div>
            <h3 style="text-align: center; margin-top: 15px; color: var(--text-light);">${title}</h3>
        </div>
        `;
        
        let isFlipped = false;
        const flipper = document.getElementById('flipper');
        flipper.addEventListener('click', () => {
            isFlipped = !isFlipped;
            flipper.style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
        });
    }
    
    function showModalWithoutFlip(src, alt) {
        modalBody.innerHTML = `
        <div class="image-modal-content">
            <div class="simple-image-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh;">
                <img src="${src}" alt="${alt}" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);">
                <div style="text-align: center; margin-top: 15px; color: var(--text-dark);">ℹ️ Оборотная сторона отсутствует</div>
            </div>
            <h3 style="text-align: center; margin-top: 15px; color: var(--text-light);">${alt}</h3>
        </div>
        `;
    }
    
    modal.style.display = 'block';
    document.body.classList.add('modal-open');
}

        // Закрытие модального окна по клику вне его
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('image-modal');
            if (e.target === modal) {
                modal.style.display = 'none';
                document.body.classList.remove('modal-open');
            }
        });

        // Закрытие по Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const modal = document.getElementById('image-modal');
                modal.style.display = 'none';
                document.body.classList.remove('modal-open');
            }
        });

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', async () => {
            const ref = new CardReference();
            await ref.loadCardData();
            ref.renderCards();
        });
        document.getElementById('refresh-cards').addEventListener('click', async () => {
        const ref = new CardReference();
        await ref.loadCardData();
        ref.renderCards();
        });
    </script>

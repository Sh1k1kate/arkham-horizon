                    { name: 'Эхо из глубин', image: './images/scenarios/echo_deep.jpg', description: 'Загадочные события на побережье намекают на присутствие древних существ', type: 'scenario' },

                    { name: 'Призваны служить', image: './images/scenarios/summoned_serve.jpg', description: 'Столкновение с культом, пытающимся призвать на службу тёмных существ', type: 'scenario' }
                ];

                // Древние
                this.cards.ancient = [
                    { name: 'Азатот', image: './images/ancient/azathoth.jpg', description: 'Слепой бог-ид, правящий в центре вселенной', type: 'ancient' },
                    { name: 'Ктулху', image: './images/ancient/cthulhu.jpg', description: 'Великий Древний, спящий в Р\'льехе', type: 'ancient' },

            // Получить общее количество карт
            getTotalCards() {
                let total = 0;
                for (let category in this.cards) {
                    total += this.cards[category].length;
                }
                return total;
            }

            // Отрисовка карт на странице
            renderCards() {
                const container = document.getElementById('cards-container');
                const countElement = document.getElementById('cards-count');
                
                if (!container) return;
                
                let html = '';
                for (let category in this.cards) {
                    html += this.cards[category].map(card => this.renderCard(card)).join('');
                }
                
                container.innerHTML = html;
                
                if (countElement) {
                    countElement.innerHTML = `Всего карт в картотеке: <span>${this.getTotalCards()}</span>`;
                }
                
                // Инициализируем поиск и фильтры после отрисовки
                this.initSearchAndFilters();
            }

            // Отрисовка одной карты
            renderCard(card) {
                const defaultImage = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjI4MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMzMzIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPtCd0LXRgiDRjdC70LXQvNC10L3RgtCwPC90ZXh0Pjwvc3ZnPg==';
                
                return `
                <div class="help-card" data-category="${card.type}" data-name="${card.name.toLowerCase()}">
                    <div class="help-card-inner">
                        <div class="help-card-image" onclick="showImageModal('${card.image}', '${card.name}')">
                            <img src="${card.image}" alt="${card.name}" 
                                 onerror="this.src='${defaultImage}'">
                        </div>
                        <div class="help-card-content">
                            <h3 class="help-card-title">${card.name}</h3>
                            <p class="help-card-description">${card.description || 'Описание отсутствует'}</p>
                            <span class="help-card-type">${this.getTypeLabel(card.type)}</span>
                        </div>
                    </div>
                </div>
                `;
            }

            getTypeLabel(type) {
                const labels = {
                    'investigator': 'Сыщик',
                    'scenario': 'Сценарий',
                    'ancient': 'Древний',
                    'item': 'Предмет',
                    'spell': 'Заклинание'
                };
                return labels[type] || type;
            }

            // Инициализация поиска и фильтров
            initSearchAndFilters() {
                const searchInput = document.getElementById('help-search');
                const filterBtns = document.querySelectorAll('.help-filter-btn');
                const cards = document.querySelectorAll('.help-card');
                const countElement = document.getElementById('cards-count');

                if (!searchInput || !cards.length) return;

                // Функция обновления видимости карт
                const updateVisibility = () => {
                    const searchTerm = searchInput.value.toLowerCase();
                    const activeFilter = document.querySelector('.help-filter-btn.active')?.dataset.category || 'all';
                    
                    let visibleCount = 0;
                    
                    cards.forEach(card => {
                        const name = card.dataset.name;
                        const category = card.dataset.category;
                        
                        const matchesSearch = name.includes(searchTerm);
                        const matchesFilter = activeFilter === 'all' || category === activeFilter;
                        
                        const shouldShow = matchesSearch && matchesFilter;
                        card.style.display = shouldShow ? 'block' : 'none';
                        
                        if (shouldShow) visibleCount++;
                    });
                    
                    // Показываем сообщение, если нет результатов
                    const container = document.getElementById('cards-container');
                    let noResultsMsg = document.querySelector('.no-results-dynamic');
                    
                    if (visibleCount === 0) {
                        if (!noResultsMsg) {
                            noResultsMsg = document.createElement('div');
                            noResultsMsg.className = 'no-results-message no-results-dynamic';
                            container.appendChild(noResultsMsg);
                        }
                        noResultsMsg.textContent = '😔 Ничего не найдено. Попробуйте изменить запрос.';
                    } else {
                        if (noResultsMsg) {
                            noResultsMsg.remove();
                        }
                    }
                    
                    // Обновляем счетчик
                    if (countElement) {
                        const totalCards = this.getTotalCards();
                        countElement.innerHTML = `Показано карт: <span>${visibleCount}</span> из <span>${totalCards}</span>`;
                    }
                };

                // Поиск при вводе
                searchInput.addEventListener('input', updateVisibility);

                // Фильтры при клике
                filterBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        filterBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        updateVisibility();
                    });
                });
            }
        }

        // Функция для показа изображений в модальном окне
        async function showImageModal(src, alt) {
            const modal = document.getElementById('image-modal');
            const modalBody = document.getElementById('image-modal-body');
            
            const basePath = src.replace(/\.[^/.]+$/, "");
            const backSideSrc = `${basePath}-1.jpg`;
            
            // Проверяем существование обратной стороны
            const checkBackImage = new Image();
            checkBackImage.onload = () => {
                // Обратная сторона существует
                modalBody.innerHTML = `
                <div class="image-modal-content">
                    <div class="simple-image-container" style="position: relative; width: 100%; height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; perspective: 1000px;">
                        <div id="flipper" style="position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer;">
                            <div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center;">
                                <img src="${src}" alt="${alt}" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);">
                            </div>
                            <div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center;">
                                <img src="${backSideSrc}" alt="${alt} (обратная сторона)" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);">
                            </div>
                        </div>
                        <div style="text-align: center; margin-top: 15px; color: var(--accent);">👆 Нажмите на изображение для переворота</div>
                    </div>
                    <h3 style="text-align: center; margin-top: 15px; color: var(--text-light);">${alt}</h3>
                </div>
                `;
                
                let isFlipped = false;
                const flipper = document.getElementById('flipper');
                flipper.addEventListener('click', () => {
                    isFlipped = !isFlipped;
                    flipper.style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
                });
            };
            
            checkBackImage.onerror = () => {
                // Обратной стороны нет
                modalBody.innerHTML = `
                <div class="image-modal-content">
                    <div class="simple-image-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh;">
                        <img src="${src}" alt="${alt}" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);">
                        <div style="text-align: center; margin-top: 15px; color: var(--text-dark);">ℹ️ Обратная сторона отсутствует</div>
                    </div>
                    <h3 style="text-align: center; margin-top: 15px; color: var(--text-light);">${alt}</h3>
                </div>
                `;
            };
            
            checkBackImage.src = backSideSrc;
            
            modal.style.display = 'block';
            document.body.classList.add('modal-open');
        }

        // Закрытие модального окна по клику вне его
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('image-modal');
            if (e.target === modal) {
                modal.style.display = 'none';
                document.body.classList.remove('modal-open');
            }
        });

        // Закрытие по Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const modal = document.getElementById('image-modal');
                modal.style.display = 'none';
                document.body.classList.remove('modal-open');
            }
        });

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', async () => {
            const reference = new CardReference();
            await reference.loadCardData();
            reference.renderCards();
        });
    </script>
</body>
</html>

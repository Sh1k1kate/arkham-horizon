    <style>
        /* Дополнительные стили для страницы справочника */
        .help-page {
            padding-top: 20px;
        }
        
        .top-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 25px;
            padding: 10px 20px;
            background: rgba(26, 26, 46, 0.5);
            border-radius: var(--border-radius);
            border: 1px solid rgba(218, 165, 32, 0.3);
            backdrop-filter: blur(5px);
        }
        
        .top-action-btn {
            background: linear-gradient(135deg, var(--secondary-light), var(--secondary));
            color: var(--text-light);
            padding: 10px 20px;
            border: 1px solid var(--accent);
            border-radius: var(--border-radius);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .top-action-btn:hover {
            background: var(--accent);
            color: var(--secondary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        
        .help-controls {
            background: rgba(26, 26, 46, 0.7);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(218, 165, 32, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .cards-count {
            text-align: center;
            color: var(--text-dark);
            margin: 20px 0;
            font-size: 1.1rem;
        }
        
        .cards-count span {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.3rem;
        }
        
        .no-results-message {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-dark);
            font-style: italic;
            padding: 60px 20px;
            font-size: 1.2rem;
            background: rgba(15, 15, 26, 0.5);
            border-radius: var(--border-radius);
            border: 1px solid rgba(218, 165, 32, 0.2);
        }

        /* Стили для сетки карточек (компактные) */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        .compact-card {
            background: linear-gradient(135deg, var(--secondary-light), var(--secondary));
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(218, 165, 32, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .compact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(218, 165, 32, 0.3);
            border-color: var(--accent);
        }

        .compact-card-image {
            width: 100%;
            height: 140px;
            overflow: hidden;
            border-bottom: 2px solid var(--accent);
            position: relative;
        }

        .compact-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .compact-card:hover .compact-card-image img {
            transform: scale(1.1);
        }

        .compact-card-content {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .compact-card-title {
            color: var(--accent);
            font-size: 1rem;
            margin-bottom: 6px;
            font-family: 'MedievalSharp', cursive;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.6rem;
        }

        .compact-card-description {
            color: var(--text-dark);
            font-size: 0.8rem;
            line-height: 1.4;
            margin-bottom: 10px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 3.4rem;
        }

        .compact-card-type {
            display: inline-block;
            padding: 4px 8px;
            background: var(--secondary-dark);
            border-radius: 12px;
            font-size: 0.7rem;
            color: var(--accent);
            border: 1px solid var(--accent);
            align-self: flex-start;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            
            .compact-card-image {
                height: 120px;
            }
            
            .compact-card-title {
                font-size: 0.9rem;
            }
            
            .compact-card-description {
                font-size: 0.75rem;
                -webkit-line-clamp: 2;
                min-height: 2.2rem;
            }
        }

        @media (max-width: 480px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .compact-card-image {
                height: 100px;
            }
        }
    </style>
</head>
<body>

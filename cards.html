<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аркхем Хорайзон - Справочник карт</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg...%3E">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Все необходимые стили для справочника (см. предыдущие ответы) */
    </style>
</head>
<body>
    <!-- Фон (как на главной) -->
    <div class="background-elements">...</div>

    <div class="container help-page">
        <!-- Шапка и верхняя навигация -->
        <header class="main-header">...</header>
        <div class="top-actions">...</div>

        <!-- Поиск и фильтры -->
        <div class="help-controls">
            <div class="help-search">
                <input type="text" id="help-search" class="help-search-input" placeholder="🔍 Поиск карт по названию...">
            </div>
            <div class="help-filters">
                <button class="help-filter-btn active" data-category="all">Все</button>
                <button class="help-filter-btn" data-category="investigator">Сыщики</button>
                <button class="help-filter-btn" data-category="scenario">Сценарии</button>
                <button class="help-filter-btn" data-category="ancient">Древние</button>
                <button class="help-filter-btn" data-category="item">Предметы</button>
                <button class="help-filter-btn" data-category="spell">Заклинания</button>
                <button class="help-filter-btn" data-category="ally">Союзники</button>
                <button class="help-filter-btn" data-category="condition">Состояния</button>
            </div>
            <div class="cards-count" id="cards-count">Загружается...</div>
        </div>

        <!-- Сетка карт -->
        <section class="records-section">
            <h2 class="section-title eldritch-text">⬡ Картотека Аркхэма</h2>
            <div class="cards-grid" id="cards-container">
                <div class="no-results-message">Загрузка картотеки...</div>
            </div>
        </section>
    </div>

    <!-- Модальное окно для изображений -->
    <div id="image-modal" class="modal">...</div>

    <script>
        // ================== ПОЛНОСТЬЮ САМОДОСТАТОЧНЫЙ СКРИПТ ==================

        class CardReference {
            constructor() {
                this.cards = {
                    investigators: [],
                    scenarios: [],
                    ancient: [],
                    items: [],
                    spells: [],
                    allies: [],
                    conditions: []
                };
            }

            async loadCardData() {
                try {
                    // Пытаемся загрузить данные с GitHub (или из локального файла)
                    const response = await fetch('data/cards.json');
                    if (response.ok) {
                        const data = await response.json();
                        // Преобразуем в единый формат с type
                        for (let key in data) {
                            if (this.cards.hasOwnProperty(key)) {
                                this.cards[key] = data[key].map(card => ({
                                    ...card,
                                    type: key === 'investigators' ? 'investigator' :
                                          key === 'scenarios' ? 'scenario' :
                                          key === 'ancient' ? 'ancient' :
                                          key === 'items' ? 'item' :
                                          key === 'spells' ? 'spell' :
                                          key === 'allies' ? 'ally' : 'condition'
                                }));
                            }
                        }
                    } else {
                        // Если файла нет, используем локальные тестовые данные (можно убрать)
                        console.warn('Файл data/cards.json не найден, используются тестовые данные');
                        this.loadLocalData();
                    }
                } catch (error) {
                    console.error('Ошибка загрузки данных:', error);
                    this.loadLocalData();
                }
            }

            loadLocalData() {
                // Здесь можно оставить пустые массивы или добавить тестовые карты
                this.cards = {
                    investigators: [],
                    scenarios: [],
                    ancient: [],
                    items: [],
                    spells: [],
                    allies: [],
                    conditions: []
                };
            }

            getTotalCards() {
                return Object.values(this.cards).reduce((sum, arr) => sum + arr.length, 0);
            }

            renderCards() {
                const container = document.getElementById('cards-container');
                const countEl = document.getElementById('cards-count');
                if (!container) return;

                let html = '';
                for (let category in this.cards) {
                    html += this.cards[category].map(card => this.renderCard(card)).join('');
                }

                container.innerHTML = html || '<div class="no-results-message">Нет карт для отображения</div>';

                if (countEl) {
                    countEl.innerHTML = `Всего карт: <span>${this.getTotalCards()}</span>`;
                }

                this.initSearchAndFilters();
            }

            renderCard(card) {
                const defaultImage = 'data:image/svg+xml...'; // заглушка
                return `
                <div class="compact-card" data-category="${card.type}" data-name="${card.name.toLowerCase()}">
                    <div class="compact-card-image" onclick="showImageModal('${card.image}', '${card.name}')">
                        <img src="${card.image}" alt="${card.name}" onerror="this.src='${defaultImage}'">
                    </div>
                    <div class="compact-card-content">
                        <h3 class="compact-card-title">${card.name}</h3>
                        <p class="compact-card-description">${card.description || 'Описание отсутствует'}</p>
                        <span class="compact-card-type">${this.getTypeLabel(card.type)}</span>
                    </div>
                </div>
                `;
            }

            getTypeLabel(type) {
                const labels = {
                    'investigator': 'Сыщик',
                    'scenario': 'Сценарий',
                    'ancient': 'Древний',
                    'item': 'Предмет',
                    'spell': 'Заклинание',
                    'ally': 'Союзник',
                    'condition': 'Состояние'
                };
                return labels[type] || type;
            }

            initSearchAndFilters() {
                const searchInput = document.getElementById('help-search');
                const filterBtns = document.querySelectorAll('.help-filter-btn');
                const cards = document.querySelectorAll('.compact-card');
                const countEl = document.getElementById('cards-count');

                if (!searchInput || !cards.length) return;

                const updateVisibility = () => {
                    const searchTerm = searchInput.value.toLowerCase();
                    const activeFilter = document.querySelector('.help-filter-btn.active')?.dataset.category || 'all';
                    let visible = 0;

                    cards.forEach(card => {
                        const name = card.dataset.name;
                        const category = card.dataset.category;
                        const matchesSearch = name.includes(searchTerm);
                        const matchesFilter = activeFilter === 'all' || category === activeFilter;
                        card.style.display = matchesSearch && matchesFilter ? 'block' : 'none';
                        if (matchesSearch && matchesFilter) visible++;
                    });

                    // Обновляем счётчик
                    if (countEl) {
                        countEl.innerHTML = `Показано карт: <span>${visible}</span> из <span>${this.getTotalCards()}</span>`;
                    }

                    // Показываем сообщение, если ничего не найдено
                    const container = document.getElementById('cards-container');
                    let noResults = document.querySelector('.no-results-dynamic');
                    if (visible === 0) {
                        if (!noResults) {
                            noResults = document.createElement('div');
                            noResults.className = 'no-results-message no-results-dynamic';
                            container.appendChild(noResults);
                        }
                        noResults.textContent = '😔 Ничего не найдено. Попробуйте изменить запрос.';
                    } else {
                        if (noResults) noResults.remove();
                    }
                };

                searchInput.addEventListener('input', updateVisibility);
                filterBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        filterBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        updateVisibility();
                    });
                });

                updateVisibility(); // первичное обновление
            }
        }

        // Функция для показа изображений (копия из script.js, адаптированная)
        async function showImageModal(src, alt) {
            // ... (полная реализация из предыдущих ответов)
        }

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', async () => {
            const ref = new CardReference();
            await ref.loadCardData();
            ref.renderCards();
        });
    </script>
</body>
</html>

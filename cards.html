<head>

    <meta name="keywords" content="Ужас Аркхема, Arkham Horror, карты, справочник, сыщики, сценарии, древние">
    
    <!-- Favicon с щупальцем и глазом -->

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Дополнительные стили только для страницы справочника */
        .help-page {
            padding-top: 20px;
        }
        
        .help-controls {
            background: rgba(26, 26, 46, 0.7);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(218, 165, 32, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: var(--accent);
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            transform: translateX(-5px);
            text-shadow: 0 0 10px var(--accent);
        }
        
        .cards-count {
            text-align: center;
            color: var(--text-dark);
            margin: 20px 0;
            font-size: 1.1rem;
        }
        
        .cards-count span {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.3rem;
        }
        
        .no-results-message {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-dark);
            font-style: italic;
            padding: 60px 20px;
            font-size: 1.2rem;
            background: rgba(15, 15, 26, 0.5);
            border-radius: var(--border-radius);
            border: 1px solid rgba(218, 165, 32, 0.2);
        }

        /* Стили для сетки карточек */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        /* Компактная карточка */
        .compact-card {
            background: linear-gradient(135deg, var(--secondary-light), var(--secondary));
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(218, 165, 32, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .compact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(218, 165, 32, 0.3);
            border-color: var(--accent);
        }

        .compact-card-image {
            width: 100%;
            height: 140px;
            overflow: hidden;
            border-bottom: 2px solid var(--accent);
            position: relative;
        }

        .compact-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .compact-card:hover .compact-card-image img {
            transform: scale(1.1);
        }

        .compact-card-content {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .compact-card-title {
            color: var(--accent);
            font-size: 1rem;
            margin-bottom: 6px;
            font-family: 'MedievalSharp', cursive;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.6rem;
        }

        .compact-card-description {
            color: var(--text-dark);
            font-size: 0.8rem;
            line-height: 1.4;
            margin-bottom: 10px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 3.4rem;
        }

        .compact-card-type {
            display: inline-block;
            padding: 4px 8px;
            background: var(--secondary-dark);
            border-radius: 12px;
            font-size: 0.7rem;
            color: var(--accent);
            border: 1px solid var(--accent);
            align-self: flex-start;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            
            .compact-card-image {
                height: 120px;
            }
            
            .compact-card-title {
                font-size: 0.9rem;
            }
            
            .compact-card-description {
                font-size: 0.75rem;
                -webkit-line-clamp: 2;
                min-height: 2.2rem;
            }
        }

        @media (max-width: 480px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .compact-card-image {
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- Фон с атмосферными элементами -->
    <div class="background-elements">
        <div class="tentacle tentacle-1"></div>
        <div class="tentacle tentacle-2"></div>
        <div class="tentacle tentacle-3"></div>
        <div class="tentacle tentacle-4"></div>
        <div class="eldritch-symbol symbol-1">⚸</div>
        <div class="eldritch-symbol symbol-2">♆</div>
        <div class="eldritch-symbol symbol-3">♇</div>
        <div class="eldritch-symbol symbol-4">⚕</div>
        <div class="eldritch-symbol symbol-5">⚚</div>
        <div class="ancient-rune rune-1">ᚠ</div>
        <div class="ancient-rune rune-2">ᚢ</div>
        <div class="ancient-rune rune-3">ᚦ</div>
        <div class="ancient-rune rune-4">ᚨ</div>
        <div class="ancient-rune rune-5">ᚱ</div>
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
        <div class="nebula nebula-3"></div>
        <div class="floating-eye eye-1">👁️</div>
        <div class="floating-eye eye-2">👁️</div>
        <div class="floating-eye eye-3">👁️</div>
        <div class="pulsating-orb orb-1"></div>
        <div class="pulsating-orb orb-2"></div>
        <div class="pulsating-orb orb-3"></div>
        <div class="whispering-shadow shadow-1"></div>
        <div class="whispering-shadow shadow-2"></div>
    </div>

    <div class="container help-page">
        <!-- Заголовок -->
        <header class="main-header">
            <div class="title-container">
                <h1 class="main-title eldritch-text">Справочник исследователя</h1>
                <p class="subtitle ancient-script">Все карты игры Ужас Аркхэма 3-я редакция</p>
                <div class="decoration-line"></div>
                <div class="header-ornament">
                    <a href="index.html" class="back-link">← Вернуться к трекеру</a>
                </div>
            </div>
        </header>

        <!-- Поиск и фильтры -->
        <div class="help-controls">
            <div class="help-search">
                <input type="text" id="help-search" class="help-search-input" placeholder="🔍 Поиск карт по названию...">
            </div>
            <div class="help-filters">
                <button class="help-filter-btn active" data-category="all">Все</button>
                <button class="help-filter-btn" data-category="investigator">Сыщики</button>
                <button class="help-filter-btn" data-category="scenario">Сценарии</button>
                <button class="help-filter-btn" data-category="ancient">Древние</button>
                <button class="help-filter-btn" data-category="item">Предметы</button>
                <button class="help-filter-btn" data-category="spell">Заклинания</button>
            </div>
            <div class="cards-count" id="cards-count">Загружается...</div>
        </div>

        <!-- Сетка карт -->
        <section class="records-section">
            <h2 class="section-title eldritch-text">⬡ Картотека Аркхэма</h2>
            <div class="cards-grid" id="cards-container">
                <!-- Карты будут загружаться через JavaScript -->
                <div class="no-results-message">Загрузка картотеки...</div>
            </div>
        </section>
    </div>

    <!-- Модальное окно для изображений -->
    <div id="image-modal" class="modal">
        <div class="modal-content image-modal-content">
            <span class="close" onclick="document.getElementById('image-modal').style.display='none'">&times;</span>
            <div id="image-modal-body" class="modal-body image-modal-body">
                <!-- Содержимое будет вставлено через JS -->
            </div>
        </div>
    </div>

    <!-- Уведомления -->
    <div id="notification-container" class="notification-container"></div>

    <script>
        // В начало скрипта cards.html добавьте:
let githubSync = null;

// Проверяем настройки GitHub при загрузке
document.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('github_token');
    const owner = localStorage.getItem('github_owner');
    const repo = localStorage.getItem('github_repo');
    
    if (token && owner && repo) {
        githubSync = new GitHubSyncManager();
        githubSync.token = token;
        githubSync.owner = owner;
        githubSync.repo = repo;
    }
    
    const reference = new CardReference();
    await reference.loadCardData();
    reference.renderCards();
});
        // Класс для управления справочником
        class CardReference {
            constructor() {
                this.cards = {
                    investigators: [],
                    scenarios: [],
                    ancient: [],
                    items: [],
                    spells: []
                };
            }

           // Замените метод loadCardData в CardReference на этот:
async loadCardData() {
    try {
        // Пытаемся загрузить из localStorage (для GitHub Pages)
        const savedData = localStorage.getItem('arkham_cards');
        if (savedData) {
            const data = JSON.parse(savedData);
            this.cards = {
                investigators: (data.investigators || []).map(c => ({...c, type: 'investigator'})),
                scenarios: (data.scenarios || []).map(c => ({...c, type: 'scenario'})),
                ancient: (data.ancient || []).map(c => ({...c, type: 'ancient'})),
                items: (data.items || []).map(c => ({...c, type: 'item'})),
                spells: (data.spells || []).map(c => ({...c, type: 'spell'})),
                allies: (data.allies || []).map(c => ({...c, type: 'ally'})),
                conditions: (data.conditions || []).map(c => ({...c, type: 'condition'}))
            };
        } else {
            // Если нет сохраненных данных, используем локальные
            this.loadLocalData();
        }
    } catch (error) {
        console.error('Ошибка загрузки данных:', error);
        this.loadLocalData();
    }
}
            // Получить общее количество карт
            getTotalCards() {
                let total = 0;
                for (let category in this.cards) {
                    total += this.cards[category].length;
                }
                return total;
            }

            // Отрисовка карт на странице
            renderCards() {
                const container = document.getElementById('cards-container');
                const countElement = document.getElementById('cards-count');
                
                if (!container) return;
                
                let html = '';
                for (let category in this.cards) {
                    html += this.cards[category].map(card => this.renderCard(card)).join('');
                }
                
                container.innerHTML = html;
                
                if (countElement) {
                    countElement.innerHTML = `Всего карт в картотеке: <span>${this.getTotalCards()}</span>`;
                }
                
                // Инициализируем поиск и фильтры после отрисовки
                this.initSearchAndFilters();
            }

            // Отрисовка одной карты (компактная версия)
            renderCard(card) {
                const defaultImage = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjI4MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMzMzIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPtCd0LXRgiDRjdC70LXQvNC10L3RgtCwPC90ZXh0Pjwvc3ZnPg==';
                
                return `
                <div class="compact-card" data-category="${card.type}" data-name="${card.name.toLowerCase()}">
                    <div class="compact-card-image" onclick="showImageModal('${card.image}', '${card.name}')">
                        <img src="${card.image}" alt="${card.name}" 
                             onerror="this.src='${defaultImage}'">
                    </div>
                    <div class="compact-card-content">
                        <h3 class="compact-card-title">${card.name}</h3>
                        <p class="compact-card-description">${card.description || 'Описание отсутствует'}</p>
                        <span class="compact-card-type">${this.getTypeLabel(card.type)}</span>
                    </div>
                </div>
                `;
            }

            getTypeLabel(type) {
                const labels = {
                    'investigator': 'Сыщик',
                    'scenario': 'Сценарий',
                    'ancient': 'Древний',
                    'item': 'Предмет',
                    'spell': 'Заклинание'
                };
                return labels[type] || type;
            }

            // Инициализация поиска и фильтров
            initSearchAndFilters() {
                const searchInput = document.getElementById('help-search');
                const filterBtns = document.querySelectorAll('.help-filter-btn');
                const cards = document.querySelectorAll('.compact-card');
                const countElement = document.getElementById('cards-count');

                if (!searchInput || !cards.length) return;

                // Функция обновления видимости карт
                const updateVisibility = () => {
                    const searchTerm = searchInput.value.toLowerCase();
                    const activeFilter = document.querySelector('.help-filter-btn.active')?.dataset.category || 'all';
                    
                    let visibleCount = 0;
                    
                    cards.forEach(card => {
                        const name = card.dataset.name;
                        const category = card.dataset.category;
                        
                        const matchesSearch = name.includes(searchTerm);
                        const matchesFilter = activeFilter === 'all' || category === activeFilter;
                        
                        const shouldShow = matchesSearch && matchesFilter;
                        card.style.display = shouldShow ? 'block' : 'none';
                        
                        if (shouldShow) visibleCount++;
                    });
                    
                    // Показываем сообщение, если нет результатов
                    const container = document.getElementById('cards-container');
                    let noResultsMsg = document.querySelector('.no-results-dynamic');
                    
                    if (visibleCount === 0) {
                        if (!noResultsMsg) {
                            noResultsMsg = document.createElement('div');
                            noResultsMsg.className = 'no-results-message no-results-dynamic';
                            container.appendChild(noResultsMsg);
                        }
                        noResultsMsg.textContent = '😔 Ничего не найдено. Попробуйте изменить запрос.';
                    } else {
                        if (noResultsMsg) {
                            noResultsMsg.remove();
                        }
                    }
                    
                    // Обновляем счетчик
                    if (countElement) {
                        const totalCards = this.getTotalCards();
                        countElement.innerHTML = `Показано карт: <span>${visibleCount}</span> из <span>${totalCards}</span>`;
                    }
                };

                // Поиск при вводе
                searchInput.addEventListener('input', updateVisibility);

                // Фильтры при клике
                filterBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        filterBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        updateVisibility();
                    });
                });

                // Первоначальное обновление
                updateVisibility();
            }
        }

        // Функция для показа изображений в модальном окне
        async function showImageModal(src, alt) {
            const modal = document.getElementById('image-modal');
            const modalBody = document.getElementById('image-modal-body');
            
            const basePath = src.replace(/\.[^/.]+$/, "");
            const backSideSrc = `${basePath}-1.jpg`;
            
            // Проверяем существование обратной стороны
            const checkBackImage = new Image();
            checkBackImage.onload = () => {
                // Обратная сторона существует
                modalBody.innerHTML = `
                <div class="image-modal-content">
                    <div class="simple-image-container" style="position: relative; width: 100%; height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; perspective: 1000px;">
                        <div id="flipper" style="position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer;">
                            <div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center;">
                                <img src="${src}" alt="${alt}" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);">
                            </div>
                            <div style="position: absolute; width: 100%; height: 100%; backface-visibility: hidden; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center;">
                                <img src="${backSideSrc}" alt="${alt} (обратная сторона)" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);">
                            </div>
                        </div>
                        <div style="text-align: center; margin-top: 15px; color: var(--accent);">👆 Нажмите на изображение для переворота</div>
                    </div>
                    <h3 style="text-align: center; margin-top: 15px; color: var(--text-light);">${alt}</h3>
                </div>
                `;
                
                let isFlipped = false;
                const flipper = document.getElementById('flipper');
                flipper.addEventListener('click', () => {
                    isFlipped = !isFlipped;
                    flipper.style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
                });
            };
            
            checkBackImage.onerror = () => {
                // Обратной стороны нет
                modalBody.innerHTML = `
                <div class="image-modal-content">
                    <div class="simple-image-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh;">
                        <img src="${src}" alt="${alt}" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);">
                        <div style="text-align: center; margin-top: 15px; color: var(--text-dark);">ℹ️ Обратная сторона отсутствует</div>
                    </div>
                    <h3 style="text-align: center; margin-top: 15px; color: var(--text-light);">${alt}</h3>
                </div>
                `;
            };
            
            checkBackImage.src = backSideSrc;
            
            modal.style.display = 'block';
            document.body.classList.add('modal-open');
        }

        // Закрытие модального окна по клику вне его
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('image-modal');
            if (e.target === modal) {
                modal.style.display = 'none';
                document.body.classList.remove('modal-open');
            }
        });

        // Закрытие по Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const modal = document.getElementById('image-modal');
                modal.style.display = 'none';
                document.body.classList.remove('modal-open');
            }
        });

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', async () => {
            const reference = new CardReference();
            await reference.loadCardData();
            reference.renderCards();
        });
        
    </script>
</body>
</html>

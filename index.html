<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аркхем Хорайзон - Трекер Ужаса Аркхема</title>
    <meta name="description" content="Трекер для настольной игры Ужас Аркхема с гексагональной сеткой записей">
    <meta name="keywords" content="Ужас Аркхема, Arkham Horror, трекер, настольная игра, гексагоны">
    
    <!-- Favicon в стиле игры -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,5 90,25 90,75 50,95 10,75 10,25' fill='%238b0000' stroke='%23daa520' stroke-width='3'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='%23daa520' font-family='Arial'%3E⚸%3C/text%3E%3C/svg%3E">
    <link rel="icon" type="image/png" sizes="32x32" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,5 90,25 90,75 50,95 10,75 10,25' fill='%238b0000' stroke='%23daa520' stroke-width='3'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='%23daa520' font-family='Arial'%3E⚸%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,5 90,25 90,75 50,95 10,75 10,25' fill='%238b0000' stroke='%23daa520' stroke-width='3'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='%23daa520' font-family='Arial'%3E⚸%3C/text%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Фон с атмосферными элементами -->
    <div class="background-elements">
        <div class="tentacle tentacle-1"></div>
        <div class="tentacle tentacle-2"></div>
        <div class="tentacle tentacle-3"></div>
        <div class="tentacle tentacle-4"></div>

        <div class="eldritch-symbol symbol-1">⚸</div>
        <div class="eldritch-symbol symbol-2">♆</div>
        <div class="eldritch-symbol symbol-3">♇</div>
        <div class="eldritch-symbol symbol-4">⚕</div>
        <div class="eldritch-symbol symbol-5">⚚</div>

        <div class="ancient-rune rune-1">ᚠ</div>
        <div class="ancient-rune rune-2">ᚢ</div>
        <div class="ancient-rune rune-3">ᚦ</div>
        <div class="ancient-rune rune-4">ᚨ</div>
        <div class="ancient-rune rune-5">ᚱ</div>

        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
        <div class="nebula nebula-3"></div>

        <div class="floating-eye eye-1">👁️</div>
        <div class="floating-eye eye-2">👁️</div>
        <div class="floating-eye eye-3">👁️</div>

        <div class="pulsating-orb orb-1"></div>
        <div class="pulsating-orb orb-2"></div>
        <div class="pulsating-orb orb-3"></div>

        <div class="whispering-shadow shadow-1"></div>
        <div class="whispering-shadow shadow-2"></div>
    </div>

    <div class="container">
        <!-- Заголовок -->
        <header class="main-header">
            <div class="title-container">
                <h1 class="main-title eldritch-text">Аркхем Хорайзон</h1>
                <p class="subtitle ancient-script">Трекер пройденных сюжетов Ужаса Аркхема 3-я редакция</p>
                <div class="decoration-line"></div>
                <div class="header-ornament">✦ ⋆ ⋅ ☆ ⋅ ⋆ ✦</div>
            </div>
        </header>

        <!-- Статистика -->
        <section class="stats-section">
            <h2 class="section-title eldritch-text">📊 Статистика исследований</h2>
            <div class="stats-grid" id="stats-container">
                <!-- Статистика будет генерироваться через JS -->
            </div>
        </section>

        <!-- Достижения -->
        <section class="achievements-section">
            <h2 class="section-title eldritch-text">🏆 Достижения древних</h2>
            <div class="achievements-grid" id="achievements-container">
                <!-- Достижения будут генерироваться через JS -->
            </div>
        </section>

        <!-- Панель управления -->
        <section class="control-panel">
            <div class="panel-header">
                <h2 class="section-title eldritch-text">🔮 Панель архивариуса</h2>
                <div class="control-buttons">
                    <button id="setup-sync" class="control-btn btn-hover-effect">⚙️ Настроить синхронизацию</button>
                    <button id="manual-sync" class="control-btn btn-hover-effect">🔄 Загрузить из облака</button>
                    <button id="sync-status" class="control-btn btn-hover-effect">📡 Статус</button>
                    <button id="create-sync-file" class="control-btn btn-hover-effect">📁 Создать файл</button>
                </div>
            </div>

            <!-- Фильтры -->
            <div class="filters">
                <div class="filter-group">
                    <label for="filter-investigator" class="filter-label">🔍 Сыщик:</label>
                    <select id="filter-investigator" class="filter-select focus-ring">
                        <option value="all">Все исследователи</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filter-scenario" class="filter-label">📖 Сюжет:</label>
                    <select id="filter-scenario" class="filter-select focus-ring">
                        <option value="all">Все сюжеты</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filter-result" class="filter-label">🎯 Результат:</label>
                    <select id="filter-result" class="filter-select focus-ring">
                        <option value="all">Все исходы</option>
                        <option value="win">Только победы</option>
                        <option value="loss">Только поражения</option>
                    </select>
                </div>
                <button id="reset-filters" class="control-btn secondary btn-hover-effect">🔄 Сбросить фильтры</button>
            </div>

            <!-- Форма добавления записи -->
            <div class="add-record-form">
                <h3 class="form-title eldritch-text">➕ Записать новое расследование</h3>
                <form id="progress-form" class="progress-form">
                    <!-- Блок выбора количества сыщиков -->
                    <div class="form-group">
                        <label for="player-count" class="form-label">👥 Количество сыщиков в партии:</label>
                        <div class="player-count-selector">
                            <button type="button" class="count-btn" data-count="1">1</button>
                            <button type="button" class="count-btn" data-count="2">2</button>
                            <button type="button" class="count-btn" data-count="3">3</button>
                            <button type="button" class="count-btn" data-count="4">4</button>
                            <button type="button" class="count-btn" data-count="5">5</button>
                            <button type="button" class="count-btn" data-count="6">6</button>
                        </div>
                        <input type="hidden" id="player-count" value="2">
                    </div>

                    <!-- Динамические поля выбора сыщиков -->
                    <div class="form-row" id="investigators-container">
                        <!-- Поля будут генерироваться здесь -->
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="scenario" class="form-label">📜 Сюжет:</label>
                            <select id="scenario" class="form-select focus-ring" required>
                                <option value="">Выберите сюжет...</option>
                            </select>
                            <div id="scenario-preview" class="preview-container"></div>
                        </div>

                        <div class="form-group">
                            <label for="date" class="form-label">📅 Дата расследования:</label>
                            <input type="date" id="date" class="form-input focus-ring" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="result" class="form-label">⚔️ Исход:</label>
                            <select id="result" class="form-select focus-ring">
                                <option value="win">🏆 Победа - Древние отступили</option>
                                <option value="loss">💀 Поражение - Безумие поглотило</option>
                                <option value="other">❓ Иной исход</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="notes" class="form-label">📝 Заметки архивариуса:</label>
                        <textarea id="notes" class="form-textarea focus-ring" placeholder="Опишите особенности расследования, встреченные ужасы, использованные заклинания..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn btn-hover-effect glow-effect">✨ Запечатать в архивах</button>
                </form>
            </div>

            <!-- Гексагональная сетка записей -->
            <section class="records-section">
                <div class="section-header">
                    <h2 class="section-title eldritch-text">⬡ Архив расследований</h2>
                    <div class="records-counter">
                        <span id="records-count">0</span> записей в архиве
                    </div>
                </div>

                <div id="hexagon-grid" class="hexagon-grid">
                    <!-- Гексагоны будут генерироваться здесь -->
                </div>
            </section>
        </section>
    </div>

    <!-- Модальное окно для детального просмотра -->
    <div id="record-modal" class="modal">
        <div class="modal-content deep-shadow">
            <span class="close">&times;</span>
            <div id="modal-content" class="modal-body">
                <!-- Содержимое модального окна -->
            </div>
        </div>
    </div>

    <!-- Новое полноэкранное модальное окно для таблицы прогресса -->
    <div id="progress-modal" class="modal fullscreen-modal">
        <div class="modal-content fullscreen-content deep-shadow">
            <span class="close fullscreen-close">&times;</span>
            <div id="progress-modal-content" class="modal-body fullscreen-body">
                <!-- Таблица прогресса будет здесь -->
            </div>
        </div>
    </div>

    <!-- Модальное окно для изображений -->
    <div id="image-modal" class="modal">
        <div class="modal-content image-modal-content">
            <span class="close">&times;</span>
            <div id="image-modal-body" class="modal-body image-modal-body">
                <!-- Содержимое модального окна для изображений -->
            </div>
        </div>
    </div>

    <!-- Уведомления -->
    <div id="notification-container" class="notification-container"></div>

    <script src="script.js"></script>
</body>
</html>
